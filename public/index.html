<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papales AI - Experience</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Mermaid diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        :root {
            --bg-color: #0B0E11;
            --accent-color: #0078D4;
            --accent-glow: rgba(0, 120, 212, 0.4);
            --text-main: #FFFFFF;
            --text-dim: #A0AEC0;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --user-bubble: #1A202C;
            --agent-bubble: rgba(0, 120, 212, 0.15);
            --transition-speed: 0.3s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(0, 120, 212, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 120, 212, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            margin: 20px;
        }

        /* Header */
        header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            background: var(--accent-color);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .brand-info h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-dim);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #48BB78;
            border-radius: 50%;
            box-shadow: 0 0 10px #48BB78;
            animation: pulse 2s infinite;
        }

        /* Chat History */
        #chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scrollbar-width: thin;
            scrollbar-color: var(--glass-border) transparent;
        }

        #chat-history::-webkit-scrollbar {
            width: 6px;
        }

        #chat-history::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: fadeIn var(--transition-speed) ease-out;
        }

        .message.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.agent {
            align-self: flex-start;
        }

        .bubble {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            position: relative;
        }

        .user .bubble {
            background: var(--user-bubble);
            border: 1px solid var(--glass-border);
            border-bottom-right-radius: 4px;
        }

        .agent .bubble {
            background: var(--agent-bubble);
            border: 1px solid rgba(0, 120, 212, 0.3);
            border-bottom-left-radius: 4px;
        }

        .meta {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Markdown Styles in Bubbles */
        .bubble code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 4px;
            border-radius: 4px;
            font-family: monospace;
        }

        .bubble pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            border: 1px solid var(--glass-border);
        }

        .bubble p {
            margin-bottom: 8px;
        }

        .bubble p:last-child {
            margin-bottom: 0;
        }

        .mermaid-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
            display: flex;
            justify-content: center;
        }

        /* Footer / Input */
        footer {
            padding: 24px 32px;
            border-top: 1px solid var(--glass-border);
        }

        .input-wrapper {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 8px 16px;
            transition: all var(--transition-speed);
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 12px;
            font-family: inherit;
            font-size: 16px;
            outline: none;
        }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover:not(:disabled) {
            background: #1182db;
            transform: scale(1.05);
        }

        button:active:not(:disabled) {
            transform: scale(0.95);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Loading Spinner */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(72, 187, 120, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(72, 187, 120, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(72, 187, 120, 0); }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .app-container { height: 100vh; margin: 0; border-radius: 0; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="brand">
                <div class="brand-logo">
                    <i class="fas fa-bolt"></i>
                </div>
                <div class="brand-info">
                    <h1>Papales AI</h1>
                    <div class="status">
                        <div class="status-dot"></div>
                        Agent Active
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <i class="fas fa-cog" style="color: var(--text-dim); cursor: pointer;"></i>
            </div>
        </header>

        <main id="chat-history">
            <!-- Messages will appear here -->
        </main>

        <footer>
            <div class="input-wrapper">
                <input type="text" id="message-input" placeholder="Pregúntale algo a Papales..." autocomplete="off">
                <button id="send-btn">
                    <i class="fas fa-paper-plane" id="btn-icon"></i>
                </button>
            </div>
        </footer>
    </div>

    <script>
        const chatHistory = document.getElementById('chat-history');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const btnIcon = document.getElementById('btn-icon');

        // Configure Marked
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        // Configure Mermaid
        mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });

        function appendMessage(text, role) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const meta = document.createElement('div');
            meta.className = 'meta';
            meta.innerText = role === 'user' ? 'Tú' : 'Papales';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            if (role === 'agent') {
                // Custom renderer for mermaid
                const renderer = new marked.Renderer();
                const defaultCode = renderer.code.bind(renderer);
                renderer.code = (code, lang, escaped) => {
                    const cleanCode = typeof code === 'object' ? code.text : code;
                    const cleanLang = typeof lang === 'object' ? lang.lang : lang;
                    
                    if (cleanLang === 'mermaid') {
                        return `<div class="mermaid-container">
                                    <div class="mermaid">${cleanCode}</div>
                                </div>`;
                    }
                    return defaultCode(code, lang, escaped);
                };
                
                bubble.innerHTML = marked.parse(text, { renderer });
                
                // Render mermaid after inserting HTML
                setTimeout(() => {
                    mermaid.run({
                        nodes: bubble.querySelectorAll('.mermaid')
                    }).catch(err => console.error("Mermaid check failed:", err));
                }, 100);
            } else {
                bubble.innerText = text;
            }

            messageDiv.appendChild(meta);
            messageDiv.appendChild(bubble);
            chatHistory.appendChild(messageDiv);
            
            chatHistory.scrollTo({
                top: chatHistory.scrollHeight,
                behavior: 'smooth'
            });
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message agent typing-indicator-container';
            typingDiv.id = 'typing';
            typingDiv.innerHTML = `
                <div class="meta">Papales</div>
                <div class="bubble">
                    <div class="typing-indicator">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>
            `;
            chatHistory.appendChild(typingDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        async function handleSend() {
            const msg = messageInput.value.trim();
            if (!msg) return;

            // UI State
            messageInput.value = '';
            messageInput.disabled = true;
            sendBtn.disabled = true;
            btnIcon.className = 'fas fa-circle-notch fa-spin';

            appendMessage(msg, 'user');
            showTyping();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });

                if (!response.ok) throw new Error('Error en el servidor');

                const data = await response.json();
                removeTyping();
                appendMessage(data.response, 'agent');
            } catch (error) {
                removeTyping();
                appendMessage('⚠️ Error: No se pudo conectar con el agente. Verifica que el servidor esté activo.', 'agent');
                console.error(error);
            } finally {
                messageInput.disabled = false;
                sendBtn.disabled = false;
                btnIcon.className = 'fas fa-paper-plane';
                messageInput.focus();
            }
        }

        sendBtn.addEventListener('click', handleSend);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        // Initial Greeting
        window.onload = () => {
            setTimeout(() => {
                appendMessage('¡Hola! Soy Papales, tu asistente inteligente. He activado soporte para diagramas y gráficas (Mermaid). ¿En qué puedo ayudarte hoy?', 'agent');
            }, 500);
        };
    </script>
</body>
</html>
