<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Agent Chat</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glass"></div>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon"></div>
                <span>Azure Agent</span>
            </div>
            <nav>
                <div class="nav-item active">
                    <i class="icon-chat"></i>
                    <span>Chat</span>
                </div>
                <div class="nav-item">
                    <i class="icon-history"></i>
                    <span>Historial</span>
                </div>
            </nav>
            <div class="status-panel">
                <div class="status-dot online"></div>
                <span>Sistema Activo</span>
            </div>
        </aside>

        <main class="chat-area">
            <header>
                <h1>Chat con Agente</h1>
                <div class="header-actions">
                    <button id="clear-chat">Limpiar</button>
                    <div class="avatar"></div>
                </div>
            </header>

            <div id="chat-window" class="chat-window">
                <div class="message ai animate-in">
                    <div class="bubble">
                        ¡Hola! Soy tu asistente de Azure AI. ¿En qué puedo ayudarte hoy?
                    </div>
                </div>
            </div>

            <form id="chat-form" class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Escribe tu mensaje aquí..." autocomplete="off">
                    <button type="submit" id="send-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path fill="currentColor" d="M2,21L23,12L2,3V10L17,12L2,14V21Z" />
                        </svg>
                    </button>
                </div>
            </form>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
